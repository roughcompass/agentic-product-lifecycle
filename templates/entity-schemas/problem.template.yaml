# Entity Schema: Problem
# Represents any problem worth tracking — user-facing, business, operational,
# or technical. Not limited to end-user pain points.

id: ""          # kebab-case identifier (e.g., onboarding-drop-off, eng-deploy-bottleneck)
name: ""        # Human-readable name
type: problem

# --- Summary layer (the synthesized insight) ---
statement: ""   # The problem in one sentence, from the affected persona's perspective
kind: ""        # user-facing | business | operational | technical | compliance

# --- Detail layer (useful without accessing the source) ---
impact: ""      # What happens if this isn't solved
frequency: ""   # How often this is encountered (daily, weekly, per-onboarding, per-release, etc.)
severity: ""    # critical | high | medium | low
domain: ""      # Area of the product or business this affects (e.g., onboarding, billing, infrastructure)

personas: []    # Which personas experience this (references to persona IDs — any kind of persona)
evidence: []    # References to evidence entity IDs that support this problem
status: ""      # hypothesized | validated | invalidated | addressed

# --- Source layer (pointer to the original for verification) ---
source: ""      # Where this problem was identified (research, support tickets, internal, analytics)
source_ref: ""  # Specific reference (e.g., Zendesk ticket URL, analytics dashboard, retro notes)
confidence: ""  # high | medium | low

created: ""
updated: ""
