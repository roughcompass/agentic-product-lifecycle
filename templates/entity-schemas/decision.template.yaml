# Entity Schema: Decision
# A product or technical decision with rationale and evidence.

id: ""          # kebab-case identifier (e.g., build-wizard-not-autodetect)
name: ""        # Human-readable name
type: decision

statement: ""   # The decision, in one sentence
rationale: ""   # Why this choice was made
alternatives: [] # What else was considered and why it was rejected

evidence: []    # Evidence IDs that informed this decision
constraints: [] # Constraint IDs that shaped this decision
status: ""      # proposed | accepted | superseded | reversed

decided_by: ""  # Who made or approved this decision
decided_on: ""  # ISO date

created: ""
updated: ""
