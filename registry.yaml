# Agentic Product Lifecycle — Registry
# Central index of all agents, skills, and templates.
# Every entry maps to a lifecycle phase and an owner.

lifecycle_phases:
  - discovery
  - definition
  - architecture
  - validation
  - delivery
  - quality
  - release
  - feedback

agents:
  project-manager:
    file: agents/project-manager.agent.md
    phase: meta
    description: Manages this repository — ensures artifacts, registry, and README are consistent and work is committed.
    owner: roughcompass
    status: active

  discovery:
    file: agents/discovery.agent.md
    phase: discovery
    description: Conducts product discovery research, populates the knowledge graph, and produces discovery briefs.
    template: templates/discovery-brief.template.md
    skills:
      - knowledge-graph
    owner: roughcompass
    status: active

  prd-drafter:
    file: agents/prd-drafter.agent.md
    phase: definition
    description: Drafts and refines Product Requirements Documents from user input, research, or discovery artifacts.
    template: templates/prd.template.md
    owner: roughcompass
    status: active

templates:
  prd:
    file: templates/prd.template.md
    phase: definition
    description: Product Requirements Document template with structured sections for problem, solution, scope, and success criteria.
    used_by:
      - prd-drafter

  discovery-brief:
    file: templates/discovery-brief.template.md
    phase: discovery
    description: Discovery brief template synthesizing research findings with knowledge graph references.
    used_by:
      - discovery

  research-sources:
    file: templates/research-sources.template.yaml
    phase: discovery
    description: Configuration template declaring available data sources for the discovery agent.
    used_by:
      - discovery

  entity-schemas:
    file: templates/entity-schemas/
    phase: meta
    description: YAML schema templates for knowledge graph entity types (persona, problem, evidence, competitor, feature, decision, constraint).
    used_by:
      - knowledge-graph

  architecture-decision:
    file: templates/architecture-decision.template.md
    phase: architecture
    description: Architecture Decision Record template with context, alternatives, consequences, and knowledge graph references.
    used_by: []

  poc-definition:
    file: templates/poc-definition.template.md
    phase: validation
    description: POC definition template with hypothesis, success criteria, timebox, and outcome tracking.
    used_by:
      - prd-drafter

  story-weaver:
    file: templates/story-weaver/
    phase: meta
    description: Story runtime (CSS/JS), HTML template, scene patterns, and design principles for scroll-driven narratives.
    used_by:
      - story-weaver

skills:
  knowledge-graph:
    file: skills/knowledge-graph.skill.md
    phase: meta
    description: CRUD and query operations on the product knowledge graph. Used by all lifecycle agents.
    owner: roughcompass
    status: active

  story-weaver:
    file: skills/story-weaver.skill.md
    phase: meta
    description: Builds scroll-driven narrative stories as self-contained HTML from lifecycle artifacts and knowledge graph.
    owner: roughcompass
    status: active

knowledge:
  graph_index: knowledge/graph.yaml
  entity_types:
    - personas
    - problems
    - evidence
    - competitors
    - features
    - decisions
    - constraints
  schema_templates: templates/entity-schemas/
